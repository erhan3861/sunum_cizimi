<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Renkli Mitoz Bölünme Animasyonu</title>
    <style>
        :root {
            --cell-border: #2d3436;
            --cytoplasm: #fab1a0;
            --nucleus: #a29bfe;
            --chromosome: #d63031;
            --spindle: #00cec9;
            --text-bg: #ffffff;
        }
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #dfe6e9; font-family: 'Segoe UI', sans-serif; }
        
        .board { position: relative; width: 850px; height: 550px; background: white; border: 12px solid #2c3e50; border-radius: 15px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); overflow: hidden; }
        
        #hand { position: absolute; width: 90px; z-index: 100; pointer-events: none; transition: transform 0.1s linear; margin-left: -5px; margin-top: -75px; }
        
        svg { width: 100%; height: 100%; }
        path { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
        
        /* Renk Sınıfları */
        .path-cell { stroke: var(--cell-border); }
        .path-nucleus { stroke: var(--nucleus); stroke-dasharray: 5,5; } /* Kesikli çizgi */
        .path-chromo { stroke: var(--chromosome); stroke-width: 6; }
        .path-spindle { stroke: var(--spindle); stroke-width: 2; opacity: 0.6; }

        .info-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; padding: 20px; background: var(--text-bg); border-radius: 10px; border-bottom: 5px solid #0984e3; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        
        .step-title { color: #0984e3; font-weight: bold; font-size: 1.4rem; display: block; margin-bottom: 5px; }
        
        .btn-start { margin-top: 20px; padding: 12px 30px; font-size: 1.1rem; background: #00b894; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .btn-start:hover { background: #00947a; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="board">
    <img id="hand" src="https://img.icons8.com/color/96/hand-with-pen.png" alt="Hand">
    
    <svg id="svg-canvas" viewBox="0 0 800 500">
        <g id="draw-group"></g>
    </svg>

    <div id="info" class="info-panel">
        <span class="step-title">Biyoloji Dersi: Mitoz</span>
        Hazırsanız "Dersi Başlat" butonuna tıklayın.
    </div>
</div>

<button class="btn-start" onclick="runFullAnimation()">Dersi Başlat</button>

<script>
    const steps = [
        { 
            title: "FAZ 1: İNTERFAZ", 
            desc: "Hazırlık aşaması. DNA eşlenir ve hücre büyür.",
            drawings: [
                { class: "path-cell", d: "M400,220 m-130,0 a130,130 0 1,0 260,0 a130,130 0 1,0 -260,0" },
                { class: "path-nucleus", d: "M400,220 m-60,0 a60,60 0 1,0 120,0 a60,60 0 1,0 -120,0" }
            ]
        },
        { 
            title: "FAZ 2: METAFAZ", 
            desc: "Kromozomlar orta düzlemde dizilir. İğ iplikleri belirginleşir.",
            drawings: [
                { class: "path-cell", d: "M400,220 m-140,0 a140,140 0 1,0 280,0 a140,140 0 1,0 -280,0" },
                { class: "path-spindle", d: "M400,100 L400,340 M300,220 L500,220" },
                { class: "path-chromo", d: "M385,200 L415,240 M415,200 L385,240" }
            ]
        },
        { 
            title: "FAZ 3: ANAFAZ", 
            desc: "Kardeş kromatitler zıt kutuplara çekilir. Ayrılma gerçekleşir.",
            drawings: [
                { class: "path-cell", d: "M400,220 m-160,0 q0,-100 160,-100 q160,0 160,100 q0,100 -160,100 q-160,0 -160,-100" },
                { class: "path-chromo", d: "M350,180 L330,220 L350,260 M450,180 L470,220 L450,260" }
            ]
        },
        { 
            title: "FAZ 4: STOKİNEZ", 
            desc: "Sitoplazma bölünür. Aynı genetik yapıda iki yeni hücre oluşur.",
            drawings: [
                { class: "path-cell", d: "M220,220 m-90,0 a90,90 0 1,0 180,0 a90,90 0 1,0 -180,0" },
                { class: "path-cell", d: "M580,220 m-90,0 a90,90 0 1,0 180,0 a90,90 0 1,0 -180,0" },
                { class: "path-nucleus", d: "M220,220 m-30,0 a30,30 0 1,0 60,0 a30,30 0 1,0 -60,0" },
                { class: "path-nucleus", d: "M580,220 m-30,0 a30,30 0 1,0 60,0 a30,30 0 1,0 -60,0" }
            ]
        }
    ];

    const group = document.getElementById('draw-group');
    const hand = document.getElementById('hand');
    const info = document.getElementById('info');

    async function drawElement(drawing) {
        return new Promise(resolve => {
            const newPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
            newPath.setAttribute("d", drawing.d);
            newPath.setAttribute("class", drawing.class);
            group.appendChild(newPath);

            const length = newPath.getTotalLength();
            newPath.style.strokeDasharray = length;
            newPath.style.strokeDashoffset = length;

            let start = null;
            const duration = 2500; // Her bir alt çizim için süre

            function animate(now) {
                if (!start) start = now;
                let progress = (now - start) / duration;
                if (progress > 1) progress = 1;

                newPath.style.strokeDashoffset = length * (1 - progress);
                const pt = newPath.getPointAtLength(progress * length);
                hand.style.left = pt.x + 'px';
                hand.style.top = pt.y + 'px';

                if (progress < 1) requestAnimationFrame(animate);
                else resolve();
            }
            requestAnimationFrame(animate);
        });
    }

    async function runFullAnimation() {
        for (const step of steps) {
            // Ekranı temizle ve başlığı yaz
            group.innerHTML = '';
            info.innerHTML = `<span class="step-title">${step.title}</span>${step.desc}`;
            
            // Bu slayttaki tüm çizimleri sırayla yap
            for (const drawing of step.drawings) {
                await drawElement(drawing);
            }
            
            // Fasıla: Slayt bittikten sonra 3 saniye bekle
            hand.style.opacity = "0"; // Beklerken el gizlensin
            await new Promise(r => setTimeout(r, 3000));
            hand.style.opacity = "1";
        }
        info.innerHTML = `<span class="step-title">TAMAMLANDI</span>Mitoz bölünme süreci sona erdi.`;
    }
</script>

</body>
</html>
